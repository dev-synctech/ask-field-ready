<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: detail bill request</title>
  <desc id="desc">Sanitized mock billing account showing account lane, request type, recipient, and send or route action.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Billing account</text>
  <rect x="88" y="124" width="268" height="300" rx="18" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="116" y="164" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#172033">Account lane</text>
  <rect x="116" y="194" width="208" height="42" rx="12" fill="url(#brand)"/><text x="140" y="222" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF">Billing summary</text>
  <rect x="116" y="252" width="208" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/><text x="140" y="280" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="700" fill="#516070">Statements</text>
  <rect x="116" y="310" width="208" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/><text x="140" y="338" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="700" fill="#516070">Documents</text>
  <rect x="394" y="124" width="710" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="430" y="166" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="900" fill="#172033">Detail bill request</text>
  <rect x="430" y="194" width="282" height="62" rx="14" fill="#F8FBFD" stroke="#D8E2EC"/>
  <text x="452" y="222" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#516070">Request type</text>
  <text x="452" y="244" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="900" fill="#172033">Itemized / detailed bill</text>
  <rect x="430" y="274" width="282" height="62" rx="14" fill="#F8FBFD" stroke="#D8E2EC"/>
  <text x="452" y="302" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#516070">Recipient</text>
  <text x="452" y="324" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="900" fill="#172033">Approved requester</text>
  <rect x="748" y="194" width="276" height="142" rx="16" fill="#E8FBF8" stroke="#04B8AA"/>
  <text x="772" y="228" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="900" fill="#0D8B7E">Before sending</text>
  <text x="772" y="260" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#172033">Confirm account lane.</text>
  <text x="772" y="288" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#172033">Confirm delivery policy.</text>
  <text x="772" y="316" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#172033">Add clean non-PHI note.</text>
  <rect x="430" y="360" width="150" height="42" rx="12" fill="url(#brand)"/>
  <text x="482" y="387" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF">Send</text>
  <rect x="596" y="360" width="150" height="42" rx="12" fill="#FFFFFF" stroke="#1357C8"/>
  <text x="638" y="387" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="900" fill="#1357C8">Route</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="194" r="22" fill="#04B8AA"/><text x="110" y="201" fill="#FFFFFF">1</text>
    <circle cx="430" cy="194" r="22" fill="#04B8AA"/><text x="424" y="201" fill="#FFFFFF">2</text>
    <circle cx="748" cy="194" r="22" fill="#1357C8"/><text x="742" y="201" fill="#FFFFFF">3</text>
    <circle cx="430" cy="360" r="22" fill="#1357C8"/><text x="424" y="367" fill="#FFFFFF">4</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Verify the lane and recipient before sending. If policy or owner is unclear, route the request.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: patient missing from list</title>
  <desc id="desc">Sanitized mock patient dashboard showing list name, filters, relationship, refresh, and search fallback.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Patient dashboard</text>
  <rect x="88" y="124" width="310" height="300" rx="18" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="116" y="162" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#172033">List selector</text>
  <rect x="116" y="192" width="238" height="42" rx="12" fill="url(#brand)"/>
  <text x="138" y="220" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF">Expected care team</text>
  <rect x="116" y="252" width="238" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="138" y="280" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="700" fill="#516070">Unit list</text>
  <rect x="116" y="312" width="238" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="138" y="340" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="700" fill="#516070">Search fallback</text>
  <rect x="430" y="124" width="318" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="458" y="162" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#172033">Filters</text>
  <rect x="458" y="190" width="226" height="38" rx="10" fill="#F8FBFD" stroke="#D8E2EC"/><text x="480" y="215" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#516070">Location: current unit</text>
  <rect x="458" y="244" width="226" height="38" rx="10" fill="#F8FBFD" stroke="#D8E2EC"/><text x="480" y="269" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#516070">Status: active</text>
  <rect x="458" y="298" width="226" height="38" rx="10" fill="#F8FBFD" stroke="#D8E2EC"/><text x="480" y="323" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#516070">Relationship: assigned</text>
  <rect x="458" y="360" width="120" height="42" rx="12" fill="url(#brand)"/><text x="493" y="387" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF">Refresh</text>
  <rect x="782" y="124" width="300" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="810" y="162" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#172033">List rows</text>
  <rect x="810" y="190" width="226" height="50" rx="12" fill="#F4F8FB"/>
  <rect x="810" y="256" width="226" height="50" rx="12" fill="#F4F8FB"/>
  <rect x="810" y="322" width="226" height="50" rx="12" fill="#FFF7E6" stroke="#F1C46C"/>
  <text x="832" y="354" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#9A6500">Still missing?</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="192" r="22" fill="#04B8AA"/><text x="110" y="199" fill="#FFFFFF">1</text>
    <circle cx="458" cy="190" r="22" fill="#04B8AA"/><text x="452" y="197" fill="#FFFFFF">2</text>
    <circle cx="458" cy="360" r="22" fill="#1357C8"/><text x="452" y="367" fill="#FFFFFF">3</text>
    <circle cx="810" cy="322" r="22" fill="#1357C8"/><text x="804" y="329" fill="#FFFFFF">4</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Check list, filters, relationship, and refresh before calling the patient missing.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: medication not showing on MAR</title>
  <desc id="desc">Generic MAR mock screen with callouts for date/time filter, medication view, order status, and verification.</desc>
  <defs><linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter></defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="56" y="42" width="1088" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Medication Administration</text>
  <rect x="88" y="124" width="1024" height="68" rx="18" fill="#F4F8FB" stroke="#D8E2EC"/>
  <rect x="116" y="140" width="190" height="36" rx="10" fill="#EAF3FF"/><text x="138" y="164" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#172033">Date / time</text>
  <rect x="330" y="140" width="180" height="36" rx="10" fill="#EAF3FF"/><text x="352" y="164" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#172033">Scheduled</text>
  <rect x="532" y="140" width="126" height="36" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/><text x="560" y="164" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">PRN</text>
  <rect x="680" y="140" width="126" height="36" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/><text x="708" y="164" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">Held</text>
  <rect x="826" y="140" width="228" height="36" rx="10" fill="url(#brand)"/><text x="858" y="164" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="900" fill="#FFFFFF">Refresh profile</text>
  <rect x="88" y="220" width="1024" height="196" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="88" y="220" width="1024" height="48" rx="18" fill="#F5F8FB"/>
  <text x="124" y="250" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" fill="#516070">Medication</text>
  <text x="470" y="250" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" fill="#516070">Due</text>
  <text x="620" y="250" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" fill="#516070">Order</text>
  <text x="800" y="250" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" fill="#516070">Verification</text>
  <line x1="440" y1="220" x2="440" y2="416" stroke="#E0E7EF"/>
  <line x1="588" y1="220" x2="588" y2="416" stroke="#E0E7EF"/>
  <line x1="770" y1="220" x2="770" y2="416" stroke="#E0E7EF"/>
  <line x1="88" y1="320" x2="1112" y2="320" stroke="#E0E7EF"/>
  <text x="124" y="304" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">Example medication</text>
  <text x="470" y="304" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">Now</text>
  <text x="620" y="304" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#0D8B7E">Active</text>
  <text x="800" y="304" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#B7791F">Check status</text>
  <text x="124" y="360" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#7A8795">Missing row?</text>
  <text x="620" y="360" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#7A8795">Held / pending?</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="140" r="22" fill="#04B8AA"/><text x="110" y="147" fill="#FFFFFF">1</text>
    <circle cx="330" cy="140" r="22" fill="#04B8AA"/><text x="324" y="147" fill="#FFFFFF">2</text>
    <circle cx="620" cy="304" r="22" fill="#1357C8"/><text x="614" y="311" fill="#FFFFFF">3</text>
    <circle cx="800" cy="304" r="22" fill="#1357C8"/><text x="794" y="311" fill="#FFFFFF">4</text>
  </g>
  <text x="88" y="460" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Check MAR time/view filters, order state, verification/dispense status, and urgency before escalating.</text>
</svg>

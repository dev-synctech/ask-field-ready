<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: radiology scheduling board (snapboard)</title>
  <desc id="desc">Sanitized mock of a radiology scheduling board showing view selector, modality and date filters, refresh, and case detail.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Radiology scheduling board</text>

  <!-- Filters -->
  <rect x="88" y="116" width="986" height="58" rx="14" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="108" y="150" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#516070">View</text>
  <rect x="146" y="128" width="160" height="34" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="162" y="150" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Today — all modalities</text>
  <text x="324" y="150" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#516070">Modality</text>
  <rect x="392" y="128" width="120" height="34" rx="10" fill="#E8FBF8" stroke="#04B8AA"/>
  <text x="412" y="150" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#0D8B7E">CT / MRI</text>
  <text x="528" y="150" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#516070">Date</text>
  <rect x="572" y="128" width="120" height="34" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="592" y="150" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Today</text>
  <rect x="924" y="128" width="130" height="34" rx="10" fill="url(#brand)"/>
  <text x="958" y="150" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#FFFFFF">Refresh</text>

  <!-- Board grid -->
  <rect x="88" y="186" width="640" height="238" rx="14" fill="#FFFFFF" stroke="#D8E2EC"/>
  <g font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="700" fill="#516070">
    <text x="200" y="208">08:00</text><text x="290" y="208">09:00</text><text x="380" y="208">10:00</text><text x="470" y="208">11:00</text><text x="560" y="208">12:00</text>
    <text x="104" y="244">CT-1</text><text x="104" y="284">CT-2</text><text x="104" y="324">MRI-1</text><text x="104" y="364">MRI-2</text>
  </g>
  <g stroke="#E4EBF2"><line x1="160" y1="220" x2="720" y2="220"/><line x1="160" y1="260" x2="720" y2="260"/><line x1="160" y1="300" x2="720" y2="300"/><line x1="160" y1="340" x2="720" y2="340"/><line x1="160" y1="380" x2="720" y2="380"/></g>
  <rect x="180" y="226" width="76" height="28" rx="6" fill="#E8FBF8" stroke="#04B8AA"/>
  <rect x="276" y="266" width="76" height="28" rx="6" fill="#F4F8FB" stroke="#D8E2EC"/>
  <rect x="372" y="306" width="76" height="28" rx="6" fill="#FDECEC" stroke="#E66767"/>
  <text x="380" y="324" font-family="Manrope, Arial, sans-serif" font-size="11" font-weight="900" fill="#8B1F1F">Hold</text>
  <rect x="468" y="346" width="76" height="28" rx="6" fill="#F4F8FB" stroke="#D8E2EC"/>

  <!-- Case detail -->
  <rect x="748" y="186" width="326" height="238" rx="14" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="772" y="218" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#172033">Case detail</text>
  <rect x="772" y="232" width="278" height="40" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="788" y="258" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Appointment status</text>
  <rect x="772" y="280" width="278" height="40" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="788" y="306" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Protocol assigned</text>
  <rect x="772" y="328" width="278" height="40" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="788" y="354" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Patient prep complete</text>
  <rect x="772" y="376" width="160" height="36" rx="10" fill="url(#brand)"/>
  <text x="804" y="400" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#FFFFFF">Open case</text>

  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="146" cy="146" r="20" fill="#04B8AA"/><text x="140" y="153" fill="#FFFFFF">1</text>
    <circle cx="392" cy="146" r="20" fill="#1357C8"/><text x="386" y="153" fill="#FFFFFF">2</text>
    <circle cx="924" cy="146" r="20" fill="#1357C8"/><text x="918" y="153" fill="#FFFFFF">3</text>
    <circle cx="380" cy="320" r="20" fill="#E66767"/><text x="374" y="327" fill="#FFFFFF">4</text>
    <circle cx="804" cy="396" r="20" fill="#04B8AA"/><text x="798" y="403" fill="#FFFFFF">5</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Confirm view, modality, and date — most missing slots are hidden by a filter, not lost.</text>
</svg>

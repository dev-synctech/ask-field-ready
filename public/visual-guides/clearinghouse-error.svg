<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: clearinghouse error</title>
  <desc id="desc">Sanitized mock of a claim with an external status error panel showing error text, owner lane, fix-once, and refresh/retest action.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Claim — external status</text>
  <rect x="88" y="124" width="620" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="116" y="156" width="564" height="46" rx="12" fill="#F4F8FB"/>
  <text x="140" y="185" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Claim header · Payer · Date</text>
  <rect x="116" y="220" width="564" height="86" rx="12" fill="#FDECEC" stroke="#E66767"/>
  <text x="140" y="248" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="900" fill="#8B1F1F">External status code</text>
  <text x="140" y="276" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">"Subscriber ID format invalid"</text>
  <text x="140" y="296" font-family="Manrope, Arial, sans-serif" font-size="13" fill="#516070">Sample text — generic mock</text>
  <rect x="116" y="322" width="564" height="46" rx="12" fill="#F4F8FB"/>
  <text x="140" y="351" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Owner lane · Who fixes this</text>
  <rect x="740" y="124" width="334" height="300" rx="18" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="768" y="162" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#172033">Fix once, retest</text>
  <rect x="768" y="190" width="278" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="790" y="218" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#516070">1. Capture exact error text</text>
  <rect x="768" y="244" width="278" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="790" y="272" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#516070">2. Correct in owner lane</text>
  <rect x="768" y="298" width="278" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="790" y="326" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#516070">3. Refresh / retest</text>
  <rect x="768" y="358" width="130" height="42" rx="12" fill="url(#brand)"/>
  <text x="808" y="385" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#FFFFFF">Retest</text>
  <rect x="912" y="358" width="134" height="42" rx="12" fill="#FFFFFF" stroke="#1357C8"/>
  <text x="940" y="385" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#1357C8">Resend</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="220" r="22" fill="#04B8AA"/><text x="110" y="227" fill="#FFFFFF">1</text>
    <circle cx="116" cy="322" r="22" fill="#04B8AA"/><text x="110" y="329" fill="#FFFFFF">2</text>
    <circle cx="768" cy="298" r="22" fill="#1357C8"/><text x="762" y="305" fill="#FFFFFF">3</text>
    <circle cx="768" cy="358" r="22" fill="#1357C8"/><text x="762" y="365" fill="#FFFFFF">4</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Read the error, fix it once in the right lane, then refresh/retest — only resend after a clean retest.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: secure prescription printer</title>
  <desc id="desc">Sanitized mock of a print dialog showing prescription printer selection, printer status, duplicate-risk warning, and one controlled reprint.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Print prescription</text>
  <rect x="88" y="124" width="640" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="116" y="156" width="584" height="44" rx="11" fill="#F4F8FB"/>
  <text x="140" y="184" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#516070">Prescription / order</text>
  <text x="140" y="232" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="800" fill="#516070">Printer</text>
  <g>
    <rect x="116" y="240" width="584" height="42" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/>
    <text x="140" y="266" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#172033">General office printer</text>
    <rect x="116" y="288" width="584" height="42" rx="10" fill="#E8FBF8" stroke="#04B8AA"/>
    <text x="140" y="314" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#0D8B7E">Secure prescription printer · approved</text>
    <rect x="116" y="336" width="584" height="42" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/>
    <text x="140" y="362" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#172033">Other office printer</text>
  </g>
  <rect x="754" y="124" width="320" height="300" rx="18" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="782" y="162" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#172033">Before you reprint</text>
  <rect x="782" y="186" width="262" height="56" rx="11" fill="#FFF7E6" stroke="#F1C46C"/>
  <text x="804" y="208" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#9A6500">Duplicate risk</text>
  <text x="804" y="228" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Check if a copy already printed</text>
  <rect x="782" y="252" width="262" height="42" rx="11" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="804" y="278" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="800" fill="#516070">Printer online · has paper</text>
  <rect x="782" y="304" width="262" height="42" rx="11" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="804" y="330" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="800" fill="#516070">If missing → device support</text>
  <rect x="782" y="358" width="130" height="42" rx="12" fill="url(#brand)"/>
  <text x="811" y="385" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#FFFFFF">Print once</text>
  <rect x="924" y="358" width="120" height="42" rx="12" fill="#FFFFFF" stroke="#1357C8"/>
  <text x="954" y="385" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#1357C8">Cancel</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="156" r="22" fill="#04B8AA"/><text x="110" y="163" fill="#FFFFFF">1</text>
    <circle cx="116" cy="288" r="22" fill="#04B8AA"/><text x="110" y="295" fill="#FFFFFF">2</text>
    <circle cx="782" cy="186" r="22" fill="#F1C46C"/><text x="776" y="193" fill="#172033">3</text>
    <circle cx="782" cy="252" r="22" fill="#1357C8"/><text x="776" y="259" fill="#FFFFFF">4</text>
    <circle cx="782" cy="358" r="22" fill="#1357C8"/><text x="776" y="365" fill="#FFFFFF">5</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Pick the secure prescription printer, check for a duplicate, then print once.</text>
</svg>

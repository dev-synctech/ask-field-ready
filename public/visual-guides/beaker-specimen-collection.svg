<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: lab specimen collection</title>
  <desc id="desc">Sanitized mock of a collect-specimens activity showing order, label, scan, and verify-status steps.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Collect specimens</text>

  <!-- Order panel -->
  <rect x="88" y="124" width="320" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="116" y="160" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#172033">Active orders</text>
  <rect x="116" y="180" width="264" height="50" rx="10" fill="#F4F8FB"/>
  <text x="132" y="200" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="800" fill="#516070">Order — lab panel</text>
  <text x="132" y="220" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="700" fill="#516070">Container: red top  |  Volume: 5 mL</text>
  <rect x="116" y="240" width="264" height="50" rx="10" fill="#F4F8FB"/>
  <text x="132" y="260" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="800" fill="#516070">Order — lab panel</text>
  <text x="132" y="280" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="700" fill="#516070">Container: lavender  |  Volume: 3 mL</text>
  <rect x="116" y="300" width="264" height="50" rx="10" fill="#E8FBF8" stroke="#04B8AA"/>
  <text x="132" y="320" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="900" fill="#0D8B7E">Assigned to me</text>
  <text x="132" y="340" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="700" fill="#516070">Status: pending collection</text>

  <!-- Label / scan -->
  <rect x="428" y="124" width="320" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="456" y="160" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#172033">Label and scan</text>
  <rect x="456" y="180" width="264" height="60" rx="10" fill="#F4F8FB"/>
  <text x="472" y="204" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Label status</text>
  <text x="472" y="226" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="700" fill="#516070">Printed  |  Not voided  |  Not expired</text>
  <rect x="456" y="250" width="264" height="60" rx="10" fill="#F4F8FB"/>
  <text x="472" y="274" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Printer / device</text>
  <text x="472" y="296" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="700" fill="#516070">Confirm before reprint</text>
  <rect x="456" y="320" width="180" height="40" rx="11" fill="url(#brand)"/>
  <text x="492" y="346" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF">Scan and collect</text>

  <!-- Verify -->
  <rect x="768" y="124" width="306" height="300" rx="18" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="792" y="160" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#172033">Verify status</text>
  <rect x="792" y="180" width="258" height="44" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="808" y="208" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Status → Collected</text>
  <rect x="792" y="232" width="258" height="44" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="808" y="260" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Status → Received at lab</text>
  <rect x="792" y="284" width="258" height="56" rx="10" fill="#FDECEC" stroke="#E66767"/>
  <text x="808" y="308" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="900" fill="#8B1F1F">Do not re-collect a verified specimen</text>
  <text x="808" y="328" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="700" fill="#172033">Escalate to lab owner first</text>

  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="320" r="20" fill="#04B8AA"/><text x="110" y="327" fill="#FFFFFF">1</text>
    <circle cx="456" cy="210" r="20" fill="#1357C8"/><text x="450" y="217" fill="#FFFFFF">2</text>
    <circle cx="492" cy="340" r="20" fill="#1357C8"/><text x="486" y="347" fill="#FFFFFF">3</text>
    <circle cx="792" cy="208" r="20" fill="#04B8AA"/><text x="786" y="215" fill="#FFFFFF">4</text>
    <circle cx="792" cy="308" r="20" fill="#E66767"/><text x="786" y="315" fill="#FFFFFF">5</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Confirm order and label first, then scan, collect, and verify — never re-collect a verified specimen.</text>
</svg>

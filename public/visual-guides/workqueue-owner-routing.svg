<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: workqueue wrong owner</title>
  <desc id="desc">Generic workqueue mock screen with callouts for queue name, owner, filters, and route action.</desc>
  <defs><linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter></defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Workqueue</text>
  <rect x="88" y="124" width="280" height="292" rx="18" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="116" y="164" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033">Queue list</text>
  <rect x="116" y="190" width="216" height="42" rx="12" fill="url(#brand)"/><text x="136" y="218" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="900" fill="#FFFFFF">Current queue</text>
  <rect x="116" y="250" width="216" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/><text x="136" y="278" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="700" fill="#516070">Team queue</text>
  <rect x="404" y="124" width="708" height="292" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="404" y="124" width="708" height="48" rx="18" fill="#F5F8FB"/>
  <text x="430" y="154" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">Item</text>
  <text x="614" y="154" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">Owner</text>
  <text x="780" y="154" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">Status</text>
  <text x="934" y="154" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">Action</text>
  <line x1="590" y1="124" x2="590" y2="416" stroke="#E0E7EF"/>
  <line x1="756" y1="124" x2="756" y2="416" stroke="#E0E7EF"/>
  <line x1="908" y1="124" x2="908" y2="416" stroke="#E0E7EF"/>
  <line x1="404" y1="234" x2="1112" y2="234" stroke="#E0E7EF"/>
  <line x1="404" y1="300" x2="1112" y2="300" stroke="#E0E7EF"/>
  <text x="430" y="214" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">Open task</text>
  <text x="614" y="214" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#B7791F">Review owner</text>
  <text x="780" y="214" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">New</text>
  <rect x="934" y="190" width="120" height="36" rx="10" fill="#E8FBF8" stroke="#04B8AA"/><text x="964" y="214" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#0D8B7E">Route</text>
  <rect x="430" y="330" width="580" height="50" rx="14" fill="#F4F8FB"/><text x="454" y="362" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="700" fill="#516070">Filters: owner / status / date / item type</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="190" r="22" fill="#04B8AA"/><text x="110" y="197" fill="#FFFFFF">1</text>
    <circle cx="614" cy="214" r="22" fill="#04B8AA"/><text x="608" y="221" fill="#FFFFFF">2</text>
    <circle cx="430" cy="330" r="22" fill="#1357C8"/><text x="424" y="337" fill="#FFFFFF">3</text>
    <circle cx="934" cy="190" r="22" fill="#1357C8"/><text x="928" y="197" fill="#FFFFFF">4</text>
  </g>
  <text x="88" y="460" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Confirm queue, owner, filters, and approved route action. Do not resolve just to clear the item.</text>
</svg>

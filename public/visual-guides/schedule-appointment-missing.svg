<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: appointment missing from schedule</title>
  <desc id="desc">Generic schedule mock screen with numbered callouts for context, filters, status, and refresh.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#04B8AA"/>
      <stop offset="1" stop-color="#1357C8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="44" width="1092" height="432" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <rect x="54" y="44" width="1092" height="70" rx="28" fill="#F1F6FA"/>
  <text x="88" y="89" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">Schedule View</text>
  <text x="1005" y="88" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="700" fill="#1357C8">MIZLY</text>

  <rect x="88" y="142" width="1024" height="72" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="112" y="160" width="170" height="36" rx="10" fill="#EAF3FF"/>
  <text x="134" y="184" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Date: Today</text>
  <rect x="304" y="160" width="238" height="36" rx="10" fill="#EAF3FF"/>
  <text x="326" y="184" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Provider / resource</text>
  <rect x="564" y="160" width="190" height="36" rx="10" fill="#EAF3FF"/>
  <text x="586" y="184" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Location</text>
  <rect x="774" y="160" width="182" height="36" rx="10" fill="#EAF3FF"/>
  <text x="796" y="184" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Status filter</text>
  <rect x="978" y="160" width="104" height="36" rx="10" fill="url(#brand)"/>
  <text x="1002" y="184" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#FFFFFF">Refresh</text>

  <rect x="88" y="240" width="1024" height="178" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="88" y="240" width="1024" height="44" rx="18" fill="#F5F8FB"/>
  <text x="118" y="268" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">Time</text>
  <text x="272" y="268" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">Patient label</text>
  <text x="528" y="268" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">Visit type</text>
  <text x="760" y="268" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">Status</text>
  <line x1="238" y1="240" x2="238" y2="418" stroke="#E0E7EF"/>
  <line x1="492" y1="240" x2="492" y2="418" stroke="#E0E7EF"/>
  <line x1="718" y1="240" x2="718" y2="418" stroke="#E0E7EF"/>
  <line x1="88" y1="328" x2="1112" y2="328" stroke="#E0E7EF"/>
  <line x1="88" y1="374" x2="1112" y2="374" stroke="#E0E7EF"/>
  <text x="118" y="312" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">08:30</text>
  <text x="272" y="312" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">Example visit</text>
  <text x="528" y="312" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">Follow-up</text>
  <text x="760" y="312" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#0D8B7E">Visible</text>
  <text x="118" y="360" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">09:00</text>
  <text x="272" y="360" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#7A8795">Hidden by filter?</text>
  <text x="528" y="360" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#7A8795">New patient</text>
  <text x="760" y="360" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#B7791F">Check status</text>

  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="304" cy="156" r="22" fill="#04B8AA"/><text x="298" y="163" fill="#FFFFFF">1</text>
    <circle cx="778" cy="156" r="22" fill="#04B8AA"/><text x="772" y="163" fill="#FFFFFF">2</text>
    <circle cx="990" cy="156" r="22" fill="#1357C8"/><text x="984" y="163" fill="#FFFFFF">3</text>
    <circle cx="930" cy="360" r="22" fill="#1357C8"/><text x="924" y="367" fill="#FFFFFF">4</text>
  </g>
  <text x="88" y="452" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">1 Context  2 Filters  3 Refresh once  4 Escalate with view + status if still missing</text>
</svg>

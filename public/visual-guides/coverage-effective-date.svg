<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: coverage effective date</title>
  <desc id="desc">Sanitized mock of an account coverage panel showing payer, filing order, effective from/to dates, and owner routing.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Account coverage</text>
  <rect x="88" y="124" width="700" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="116" y="156" width="644" height="46" rx="12" fill="#F4F8FB"/>
  <text x="140" y="185" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Payer · Filing order · Status</text>
  <rect x="116" y="220" width="316" height="58" rx="12" fill="#FFF7E6" stroke="#F1C46C"/>
  <text x="138" y="244" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#9A6500">Effective from</text>
  <text x="138" y="266" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#172033">— check this date</text>
  <rect x="444" y="220" width="316" height="58" rx="12" fill="#FFF7E6" stroke="#F1C46C"/>
  <text x="466" y="244" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#9A6500">Effective to</text>
  <text x="466" y="266" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#172033">— check this date</text>
  <rect x="116" y="294" width="644" height="46" rx="12" fill="#F4F8FB"/>
  <text x="140" y="323" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Term vs. delete decision</text>
  <rect x="116" y="356" width="644" height="46" rx="12" fill="#F4F8FB"/>
  <text x="140" y="385" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Encounter / account link</text>
  <rect x="820" y="124" width="254" height="300" rx="18" fill="#E8FBF8" stroke="#04B8AA"/>
  <text x="848" y="162" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#0D8B7E">Decision</text>
  <text x="848" y="198" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#172033">Term old valid coverage.</text>
  <text x="848" y="220" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#172033">Delete only if added in error.</text>
  <text x="848" y="252" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#172033">Route order/owner question to coverage lead.</text>
  <rect x="848" y="342" width="200" height="42" rx="12" fill="url(#brand)"/>
  <text x="892" y="369" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF">Route owner</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="156" r="22" fill="#04B8AA"/><text x="110" y="163" fill="#FFFFFF">1</text>
    <circle cx="116" cy="220" r="22" fill="#04B8AA"/><text x="110" y="227" fill="#FFFFFF">2</text>
    <circle cx="444" cy="220" r="22" fill="#04B8AA"/><text x="438" y="227" fill="#FFFFFF">3</text>
    <circle cx="116" cy="294" r="22" fill="#1357C8"/><text x="110" y="301" fill="#FFFFFF">4</text>
    <circle cx="848" cy="342" r="22" fill="#1357C8"/><text x="842" y="349" fill="#FFFFFF">5</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Confirm payer + filing order, check effective from/to, then term or delete and route the owner.</text>
</svg>

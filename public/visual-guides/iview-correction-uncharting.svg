<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: interactive view correction and uncharting</title>
  <desc id="desc">Sanitized mock of a flowsheet/interactive view showing the wrong row, right-click modify/unchart menu, reason field, and audit trail.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Interactive view — correct or unchart</text>

  <!-- Flowsheet grid -->
  <rect x="88" y="124" width="640" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="116" y="160" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#172033">Flowsheet — vital signs</text>
  <g font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="700" fill="#516070">
    <text x="240" y="190">08:00</text><text x="330" y="190">09:00</text><text x="420" y="190">10:00</text><text x="510" y="190">11:00</text><text x="600" y="190">12:00</text>
  </g>
  <g stroke="#E4EBF2"><line x1="116" y1="200" x2="704" y2="200"/><line x1="116" y1="240" x2="704" y2="240"/><line x1="116" y1="280" x2="704" y2="280"/><line x1="116" y1="320" x2="704" y2="320"/><line x1="116" y1="360" x2="704" y2="360"/></g>
  <g font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">
    <text x="124" y="225">Temperature</text><text x="124" y="265">Heart rate</text><text x="124" y="305">BP</text><text x="124" y="345">SpO2</text>
  </g>
  <!-- Wrong row highlight -->
  <rect x="400" y="248" width="80" height="28" rx="6" fill="#FDECEC" stroke="#E66767"/>
  <text x="412" y="268" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#8B1F1F">88</text>

  <!-- Right-click menu -->
  <rect x="500" y="270" width="180" height="120" rx="10" fill="#FFFFFF" stroke="#1357C8"/>
  <text x="516" y="294" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#172033">Modify value</text>
  <text x="516" y="320" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#172033">Unchart entry</text>
  <text x="516" y="346" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="700" fill="#516070">Add reason…</text>
  <text x="516" y="372" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="700" fill="#516070">View audit</text>

  <!-- Audit panel -->
  <rect x="748" y="124" width="326" height="300" rx="18" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="772" y="160" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#172033">Audit trail</text>
  <rect x="772" y="180" width="278" height="46" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="788" y="210" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="800" fill="#516070">Original entry recorded</text>
  <rect x="772" y="234" width="278" height="46" rx="10" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="788" y="264" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="800" fill="#516070">Corrected — reason captured</text>
  <rect x="772" y="288" width="278" height="46" rx="10" fill="#E8FBF8" stroke="#04B8AA"/>
  <text x="788" y="318" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="900" fill="#0D8B7E">Original value still visible</text>
  <rect x="772" y="352" width="150" height="40" rx="11" fill="url(#brand)"/>
  <text x="808" y="378" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF">Save correction</text>

  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="124" cy="225" r="20" fill="#04B8AA"/><text x="118" y="232" fill="#FFFFFF">1</text>
    <circle cx="440" cy="262" r="20" fill="#E66767"/><text x="434" y="269" fill="#FFFFFF">2</text>
    <circle cx="516" cy="320" r="20" fill="#1357C8"/><text x="510" y="327" fill="#FFFFFF">3</text>
    <circle cx="788" cy="264" r="20" fill="#1357C8"/><text x="782" y="271" fill="#FFFFFF">4</text>
    <circle cx="808" cy="372" r="20" fill="#04B8AA"/><text x="802" y="379" fill="#FFFFFF">5</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Confirm patient and time column, then modify or unchart — corrections leave an audit trail.</text>
</svg>

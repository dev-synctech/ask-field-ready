<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-label="Patient chart does not load after admission — generic EHR-style mock guide.">
  <title>Patient chart does not load after admission</title>
  <desc>Generic EHR-style mock showing patient search, encounter banner, blank chart state, context/access check, and escalation packet. No PHI, vendor logos, MRNs, DOBs, or org names.</desc>
  <defs>
    <style>
      .bg{fill:#f7f8fa}
      .panel{fill:#ffffff;stroke:#d6dae0;stroke-width:1}
      .header{fill:#1f2937}
      .muted{fill:#6b7280}
      .label{fill:#111827;font:600 12px system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
      .body{fill:#374151;font:11px system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
      .hint{fill:#6b7280;font:10px system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
      .callout{fill:#2563eb}
      .calloutText{fill:#ffffff;font:700 12px system-ui,-apple-system,Segoe UI,Roboto,sans-serif;text-anchor:middle}
      .warn{fill:#fef3c7;stroke:#f59e0b}
      .danger{fill:#fee2e2;stroke:#dc2626}
      .ok{fill:#dcfce7;stroke:#16a34a}
      .pill{stroke-width:1}
      .divider{stroke:#e5e7eb;stroke-width:1}
      .skeleton{fill:#e5e7eb}
      .skeletonLite{fill:#eef0f3}
      .row{fill:#f3f4f6}
      .rowAlt{fill:#fafbfc}
      .btn{fill:#2563eb}
      .btnText{fill:#fff;font:600 11px system-ui,-apple-system,Segoe UI,Roboto,sans-serif;text-anchor:middle}
      .tabActive{fill:#2563eb}
      .tabIdle{fill:#e5e7eb}
      .tabActiveText{fill:#fff;font:600 11px system-ui,sans-serif;text-anchor:middle}
      .tabIdleText{fill:#374151;font:600 11px system-ui,sans-serif;text-anchor:middle}
    </style>
  </defs>

  <rect class="bg" width="960" height="620"/>

  <!-- Title bar -->
  <rect class="panel" x="16" y="14" width="928" height="36" rx="6"/>
  <text class="label" x="28" y="36">Patient Workspace — Demo</text>
  <text class="hint" x="828" y="36">Generic EHR mock · no PHI</text>

  <!-- 1. Patient search / list -->
  <rect class="panel" x="16" y="62" width="300" height="246" rx="8"/>
  <text class="label" x="28" y="84">Patient Search / List</text>
  <rect x="28" y="94" width="276" height="26" rx="4" fill="#f3f4f6" stroke="#d6dae0"/>
  <text class="hint" x="36" y="111">Search by name, ID, or unit…</text>
  <!-- list rows -->
  <g>
    <rect class="row" x="28" y="128" width="276" height="28" rx="4"/>
    <rect class="skeleton" x="36" y="136" width="120" height="6" rx="3"/>
    <rect class="skeletonLite" x="36" y="146" width="80" height="5" rx="3"/>
    <text class="hint" x="270" y="146" text-anchor="end">Admitted</text>

    <rect class="rowAlt" x="28" y="160" width="276" height="28" rx="4"/>
    <rect class="skeleton" x="36" y="168" width="140" height="6" rx="3"/>
    <rect class="skeletonLite" x="36" y="178" width="70" height="5" rx="3"/>
    <text class="hint" x="270" y="178" text-anchor="end">Pre-admit</text>

    <rect class="row" x="28" y="192" width="276" height="28" rx="4" stroke="#2563eb"/>
    <rect class="skeleton" x="36" y="200" width="160" height="6" rx="3"/>
    <rect class="skeletonLite" x="36" y="210" width="90" height="5" rx="3"/>
    <text class="hint" x="270" y="210" text-anchor="end">Selected</text>

    <rect class="rowAlt" x="28" y="224" width="276" height="28" rx="4"/>
    <rect class="skeleton" x="36" y="232" width="110" height="6" rx="3"/>
    <rect class="skeletonLite" x="36" y="242" width="60" height="5" rx="3"/>
    <text class="hint" x="270" y="242" text-anchor="end">Transferred</text>
  </g>
  <text class="hint" x="28" y="278">Confirm identity and encounter before opening.</text>
  <text class="hint" x="28" y="294">Refresh once if list looks stale.</text>

  <!-- Callout 1 -->
  <circle class="callout" cx="36" cy="78" r="12"/>
  <text class="calloutText" x="36" y="82">1</text>

  <!-- 2. Encounter / status banner -->
  <rect class="panel" x="328" y="62" width="616" height="68" rx="8"/>
  <rect class="warn pill" x="340" y="74" width="592" height="44" rx="6"/>
  <text class="label" x="356" y="94">Encounter status: ADMITTED — bed assignment pending</text>
  <text class="body" x="356" y="110">Verify correct encounter is selected. Wrong encounter is the #1 cause of "chart won't open."</text>

  <!-- Callout 2 -->
  <circle class="callout" cx="340" cy="78" r="12"/>
  <text class="calloutText" x="340" y="82">2</text>

  <!-- 3. Chart loading / blank state -->
  <rect class="panel" x="328" y="142" width="416" height="282" rx="8"/>
  <text class="label" x="340" y="164">Chart View</text>
  <!-- tabs -->
  <rect class="tabActive" x="340" y="174" width="70" height="22" rx="4"/>
  <text class="tabActiveText" x="375" y="190">Summary</text>
  <rect class="tabIdle" x="414" y="174" width="60" height="22" rx="4"/>
  <text class="tabIdleText" x="444" y="190">Notes</text>
  <rect class="tabIdle" x="478" y="174" width="60" height="22" rx="4"/>
  <text class="tabIdleText" x="508" y="190">Orders</text>
  <rect class="tabIdle" x="542" y="174" width="60" height="22" rx="4"/>
  <text class="tabIdleText" x="572" y="190">Results</text>

  <!-- blank/spinning area -->
  <rect x="340" y="206" width="392" height="206" rx="6" fill="#f9fafb" stroke="#e5e7eb"/>
  <!-- spinner ring -->
  <circle cx="536" cy="290" r="22" fill="none" stroke="#d1d5db" stroke-width="4"/>
  <path d="M 558 290 A 22 22 0 0 1 536 312" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <text class="body" x="536" y="340" text-anchor="middle">Loading chart…</text>
  <rect class="danger pill" x="360" y="364" width="352" height="36" rx="6"/>
  <text class="body" x="372" y="386">Error: "Unable to open encounter context. Try again or contact support."</text>

  <!-- Callout 3 -->
  <circle class="callout" cx="340" cy="158" r="12"/>
  <text class="calloutText" x="340" y="162">3</text>

  <!-- 4. Context / access check -->
  <rect class="panel" x="756" y="142" width="188" height="282" rx="8"/>
  <text class="label" x="768" y="164">Context & Access</text>
  <line class="divider" x1="768" y1="172" x2="932" y2="172"/>

  <text class="hint" x="768" y="190">Workstation unit</text>
  <text class="body" x="768" y="206">Unit 4 North</text>

  <text class="hint" x="768" y="226">User role</text>
  <text class="body" x="768" y="242">Inpatient nurse</text>

  <text class="hint" x="768" y="262">Access scope</text>
  <rect class="ok pill" x="768" y="270" width="100" height="20" rx="10"/>
  <text class="body" x="818" y="284" text-anchor="middle">In scope</text>

  <text class="hint" x="768" y="306">Affected users</text>
  <text class="body" x="768" y="322">Only this user</text>

  <text class="hint" x="768" y="342">Patient appears in</text>
  <text class="body" x="768" y="358">Search ✓  ·  My list ✗</text>

  <text class="hint" x="768" y="384">Refresh attempted</text>
  <text class="body" x="768" y="400">Yes (1×)</text>

  <!-- Callout 4 -->
  <circle class="callout" cx="768" cy="158" r="12"/>
  <text class="calloutText" x="768" y="162">4</text>

  <!-- 5. Escalation packet -->
  <rect class="panel" x="16" y="436" width="928" height="168" rx="8"/>
  <text class="label" x="28" y="458">Escalation Packet — copy this before you call</text>
  <line class="divider" x1="28" y1="466" x2="932" y2="466"/>

  <g transform="translate(28,478)">
    <text class="hint" x="0" y="14">Patient context</text>
    <text class="body" x="0" y="32">Encounter ID + admission status</text>

    <text class="hint" x="200" y="14">Location</text>
    <text class="body" x="200" y="32">Unit / room / workstation</text>

    <text class="hint" x="400" y="14">Exact error text</text>
    <text class="body" x="400" y="32">"Unable to open encounter context"</text>

    <text class="hint" x="640" y="14">Scope</text>
    <text class="body" x="640" y="32">One user vs many</text>

    <text class="hint" x="0" y="64">Callback</text>
    <text class="body" x="0" y="82">Phone + best window</text>

    <text class="hint" x="200" y="64">Route to</text>
    <text class="body" x="200" y="82">Registration owner OR clinical support</text>

    <text class="hint" x="400" y="64">Do NOT</text>
    <text class="body" x="400" y="82">Guess or move documentation off-policy</text>

    <rect class="btn" x="640" y="62" width="120" height="28" rx="6"/>
    <text class="btnText" x="700" y="80">Send packet</text>
  </g>

  <!-- Callout 5 -->
  <circle class="callout" cx="28" cy="452" r="12"/>
  <text class="calloutText" x="28" y="456">5</text>
</svg>

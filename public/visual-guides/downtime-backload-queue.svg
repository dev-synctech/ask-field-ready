<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Downtime backload queue mock screen</title>
  <desc id="desc">Generic Mizly mock screen showing priority stack, owner assignment, timestamp, and verification.</desc>
  <defs><style>.bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8e0eb;stroke-width:2}.nav{fill:#172033}.card{fill:#fff;stroke:#d8e0eb;stroke-width:2}.danger{fill:#fff1f2;stroke:#e11d48;stroke-width:2}.warn{fill:#fff7ed;stroke:#f59e0b;stroke-width:2}.ok{fill:#ecfdf5;stroke:#14b8a6;stroke-width:2}.text{font-family:Arial,sans-serif;fill:#172033}.muted{fill:#637083}.head{font-size:24px;font-weight:700}.small{font-size:16px}.tiny{font-size:13px}.line{stroke:#d8e0eb;stroke-width:2}.num{fill:#1554c7}.numtext{fill:#fff;font-size:18px;font-weight:700}</style></defs>
  <rect width="960" height="560" rx="28" class="bg"/>
  <rect x="36" y="36" width="888" height="488" rx="24" class="panel"/>
  <rect x="36" y="36" width="888" height="58" rx="24" class="nav"/>
  <text x="62" y="130" class="text head">Downtime Backload Queue</text>
  <text x="62" y="156" class="text small muted">Backload by priority, owner, original time, and verification.</text>
  <rect x="62" y="192" width="206" height="212" rx="16" class="danger"/>
  <text x="86" y="224" class="text small" font-weight="700">Priority stack</text>
  <path d="M86 256h144M86 286h128M86 316h152M86 346h112" class="line"/>
  <rect x="298" y="192" width="206" height="212" rx="16" class="warn"/>
  <text x="322" y="224" class="text small" font-weight="700">Owner</text>
  <path d="M322 256h126M322 286h148M322 316h112M322 346h138" class="line"/>
  <rect x="534" y="192" width="162" height="212" rx="16" class="card"/>
  <text x="558" y="224" class="text small" font-weight="700">Time</text>
  <path d="M558 256h92M558 286h108M558 316h86" class="line"/>
  <rect x="726" y="192" width="132" height="212" rx="16" class="ok"/>
  <text x="750" y="224" class="text small" font-weight="700">Verify</text>
  <path d="M750 256h66M750 286h78M750 316h62" class="line"/>
  <rect x="62" y="432" width="796" height="44" rx="16" fill="#f8fafc" stroke="#d8e0eb"/>
  <text x="88" y="460" class="text tiny">Mizly visual guide: no random entry; sort, assign, timestamp, verify, then close packet.</text>
  <g><circle cx="62" cy="192" r="18" class="num"/><text x="56" y="199" class="numtext">1</text></g>
  <g><circle cx="298" cy="192" r="18" class="num"/><text x="292" y="199" class="numtext">2</text></g>
  <g><circle cx="534" cy="192" r="18" class="num"/><text x="528" y="199" class="numtext">3</text></g>
  <g><circle cx="726" cy="192" r="18" class="num"/><text x="720" y="199" class="numtext">4</text></g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: claim error sidebar</title>
  <desc id="desc">Sanitized mock claim workspace showing where to confirm the claim, read the error, identify owner, and refresh or route.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Claim workspace</text>
  <rect x="88" y="122" width="650" height="306" rx="20" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="88" y="122" width="650" height="52" rx="20" fill="#F4F8FB"/>
  <text x="116" y="154" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">Claim summary</text>
  <text x="116" y="210" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">Status</text>
  <rect x="216" y="188" width="168" height="36" rx="10" fill="#FFF7E6" stroke="#F1C46C"/>
  <text x="236" y="212" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#9A6500">Edit found</text>
  <text x="116" y="272" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">Owner lane</text>
  <rect x="216" y="250" width="210" height="36" rx="10" fill="#E8FBF8" stroke="#04B8AA"/>
  <text x="236" y="274" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#0D8B7E">Claims team</text>
  <text x="116" y="334" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">Last action</text>
  <rect x="216" y="312" width="302" height="36" rx="10" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="236" y="336" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="700" fill="#516070">Correction pending</text>
  <rect x="778" y="122" width="306" height="306" rx="20" fill="#F8FBFD" stroke="#D8E2EC"/>
  <text x="806" y="158" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="900" fill="#172033">Error sidebar</text>
  <rect x="806" y="184" width="238" height="74" rx="14" fill="#FFFFFF" stroke="#F1C46C"/>
  <text x="826" y="214" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#9A6500">Error text</text>
  <text x="826" y="238" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#516070">Read the exact blocker.</text>
  <rect x="806" y="274" width="238" height="56" rx="14" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="826" y="308" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#172033">Assigned owner</text>
  <rect x="806" y="348" width="108" height="42" rx="12" fill="url(#brand)"/>
  <text x="833" y="375" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF">Refresh</text>
  <rect x="928" y="348" width="116" height="42" rx="12" fill="#FFFFFF" stroke="#1357C8"/>
  <text x="963" y="375" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="900" fill="#1357C8">Route</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="188" r="22" fill="#04B8AA"/><text x="110" y="195" fill="#FFFFFF">1</text>
    <circle cx="806" cy="184" r="22" fill="#04B8AA"/><text x="800" y="191" fill="#FFFFFF">2</text>
    <circle cx="216" cy="250" r="22" fill="#1357C8"/><text x="210" y="257" fill="#FFFFFF">3</text>
    <circle cx="806" cy="348" r="22" fill="#1357C8"/><text x="800" y="355" fill="#FFFFFF">4</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Read the error, confirm the owner, fix only your lane, then refresh or route. Do not clear unrelated edits.</text>
</svg>

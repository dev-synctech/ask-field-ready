<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Ambulation mobility option mock screen</title>
  <desc id="desc">Generic Mizly mock flowsheet showing ADL, Mobility, assist device, and escalation callouts.</desc>
  <defs><style>.bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8e0eb;stroke-width:2}.nav{fill:#172033}.card{fill:#fff;stroke:#d8e0eb;stroke-width:2}.soft{fill:#eef5ff}.teal{fill:#ecfdf5;stroke:#14b8a6;stroke-width:2}.text{font-family:Arial,sans-serif;fill:#172033}.muted{fill:#637083}.head{font-size:24px;font-weight:700}.small{font-size:16px}.tiny{font-size:13px}.line{stroke:#d8e0eb;stroke-width:2}.num{fill:#1554c7}.numtext{fill:#fff;font-size:18px;font-weight:700}</style></defs>
  <rect width="960" height="560" rx="28" class="bg"/>
  <rect x="36" y="36" width="888" height="488" rx="24" class="panel"/>
  <rect x="36" y="36" width="888" height="58" rx="24" class="nav"/>
  <text x="62" y="130" class="text head">Mobility Documentation</text>
  <text x="62" y="156" class="text small muted">Wheelchair-to-bathroom is usually Mobility/ADL, not off-unit Transport.</text>
  <rect x="62" y="190" width="210" height="242" rx="16" class="soft"/>
  <text x="86" y="224" class="text small" font-weight="700">ADL section</text>
  <path d="M86 260h142M86 292h112M86 324h132" class="line"/>
  <rect x="306" y="190" width="252" height="242" rx="16" class="card"/>
  <text x="330" y="224" class="text small" font-weight="700">Mobility rows</text>
  <rect x="330" y="252" width="190" height="34" rx="10" class="teal"/>
  <path d="M330 314h174M330 346h146M330 378h166" class="line"/>
  <rect x="592" y="190" width="266" height="242" rx="16" class="card"/>
  <text x="616" y="224" class="text small" font-weight="700">Assist / device details</text>
  <path d="M616 260h180M616 292h154M616 324h192M616 356h138" class="line"/>
  <rect x="62" y="462" width="796" height="36" rx="18" fill="#f8fafc" stroke="#d8e0eb"/>
  <text x="88" y="485" class="text tiny">Mizly visual guide: name the activity, find Mobility, document assist/device, escalate true missing options.</text>
  <g><circle cx="62" cy="190" r="18" class="num"/><text x="56" y="197" class="numtext">1</text></g>
  <g><circle cx="306" cy="190" r="18" class="num"/><text x="300" y="197" class="numtext">2</text></g>
  <g><circle cx="592" cy="190" r="18" class="num"/><text x="586" y="197" class="numtext">3</text></g>
  <g><circle cx="858" cy="462" r="18" class="num"/><text x="852" y="469" class="numtext">4</text></g>
</svg>

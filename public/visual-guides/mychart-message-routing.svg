  <rect x="344" y="190" width="268" height="218" rx="16" class="warn"/>
  <text x="368" y="224" class="text small" font-weight="700">Actual pool</text>
  <path d="M368 260h180" class="line"/>
  <path d="M368 290h164" class="line"/>
  <path d="M368 320h148" class="line"/>
  <g><circle cx="344" cy="190" r="18" class="num"/><text x="338" y="197" class="numtext">2</text></g>
  <rect x="626" y="190" width="268" height="218" rx="16" class="teal"/>
  <text x="650" y="224" class="text small" font-weight="700">Intended pool</text>

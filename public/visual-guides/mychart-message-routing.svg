<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Portal Message Routing</title>
  <desc id="desc">Generic Mizly mock screen. No raw screenshots, no PHI, no vendor logos.</desc>
  <defs><style>.bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8e0eb;stroke-width:2}.nav{fill:#172033}.card{fill:#fff;stroke:#d8e0eb;stroke-width:2}.soft{fill:#eef5ff}.teal{fill:#ecfdf5;stroke:#14b8a6;stroke-width:2}.warn{fill:#fff7ed;stroke:#f59e0b;stroke-width:2}.text{font-family:Arial,sans-serif;fill:#172033}.muted{fill:#637083}.head{font-size:24px;font-weight:700}.small{font-size:16px}.tiny{font-size:13px}.line{stroke:#d8e0eb;stroke-width:2}.num{fill:#1554c7}.numtext{fill:#fff;font-size:18px;font-weight:700}</style></defs>
  <rect width="960" height="560" rx="28" class="bg"/>
  <rect x="36" y="36" width="888" height="488" rx="24" class="panel"/>
  <rect x="36" y="36" width="888" height="58" rx="24" class="nav"/>
  <text x="62" y="130" class="text head">Portal Message Routing</text>
  <text x="62" y="156" class="text small muted">Compare actual pool with intended pool before changing user behavior.</text>

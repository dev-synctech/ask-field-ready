<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Allergy or reaction block mock screen</title>
  <desc id="desc">Generic Mizly mock screen with callouts for allergy context, blocked order, owner, and escalation.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#02a7a0"/>
      <stop offset="1" stop-color="#1554c7"/>
    </linearGradient>
    <style>
      .bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8e0eb;stroke-width:2}.soft{fill:#eef5ff}.line{stroke:#d8e0eb;stroke-width:2}.text{font-family:Arial,sans-serif;fill:#172033}.muted{fill:#637083}.head{font-size:24px;font-weight:700}.small{font-size:16px}.tiny{font-size:13px}.warn{fill:#fff7ed;stroke:#f59e0b;stroke-width:2}.danger{fill:#fff1f2;stroke:#e11d48;stroke-width:2}.ok{fill:#ecfdf5;stroke:#14b8a6;stroke-width:2}.num{fill:#1554c7}.numtext{fill:#fff;font-size:18px;font-weight:700}
    </style>
  </defs>
  <rect width="960" height="560" rx="28" class="bg"/>
  <rect x="34" y="34" width="892" height="492" rx="24" class="panel"/>
  <rect x="34" y="34" width="892" height="58" rx="24" fill="#172033"/>
  <circle cx="72" cy="63" r="10" fill="#02a7a0"/><rect x="94" y="55" width="155" height="16" rx="8" fill="#e8eef7"/>
  <text x="50" y="128" class="text head">Medication Safety Stop</text>
  <text x="50" y="153" class="text small muted">Generic alert review before proceeding</text>
  <rect x="50" y="184" width="390" height="96" rx="16" class="danger"/>
  <text x="74" y="218" class="text small" font-weight="700">Alert: Allergy / Reaction Review</text>
  <text x="74" y="246" class="text tiny muted">Reaction context or severity needs confirmation.</text>
  <rect x="470" y="184" width="390" height="96" rx="16" class="warn"/>
  <text x="494" y="218" class="text small" font-weight="700">Blocked medication/order</text>
  <text x="494" y="246" class="text tiny muted">Do not bypass until owner path is clear.</text>
  <rect x="50" y="312" width="250" height="122" rx="16" class="soft"/>
  <text x="76" y="346" class="text small" font-weight="700">Allergy context</text>
  <path d="M76 372h184M76 398h150" class="line"/>
  <rect x="330" y="312" width="250" height="122" rx="16" class="soft"/>
  <text x="356" y="346" class="text small" font-weight="700">Clinical owner</text>
  <path d="M356 372h184M356 398h130" class="line"/>
  <rect x="610" y="312" width="250" height="122" rx="16" class="ok"/>
  <text x="636" y="346" class="text small" font-weight="700">Escalation packet</text>
  <path d="M636 372h184M636 398h150" class="line"/>
  <g><circle cx="48" cy="184" r="18" class="num"/><text x="42" y="191" class="numtext">1</text></g>
  <g><circle cx="470" cy="184" r="18" class="num"/><text x="464" y="191" class="numtext">2</text></g>
  <g><circle cx="330" cy="312" r="18" class="num"/><text x="324" y="319" class="numtext">3</text></g>
  <g><circle cx="610" cy="312" r="18" class="num"/><text x="604" y="319" class="numtext">4</text></g>
  <rect x="50" y="462" width="810" height="34" rx="17" fill="url(#brand)" opacity=".14"/>
  <text x="72" y="484" class="text tiny">Mizly visual guide: verify context, do not decide clinical override, escalate unclear safety blocks.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: portal proxy access</title>
  <desc id="desc">Sanitized mock portal administration view showing patient record, proxy record, relationship type, access level, and escalation path.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Portal access admin</text>
  <rect x="88" y="124" width="302" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="116" y="162" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#172033">Patient record</text>
  <rect x="116" y="194" width="226" height="44" rx="12" fill="#F4F8FB"/>
  <text x="138" y="222" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Portal account status</text>
  <rect x="116" y="258" width="226" height="44" rx="12" fill="#F4F8FB"/>
  <text x="138" y="286" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Age / privacy rules</text>
  <rect x="430" y="124" width="302" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="458" y="162" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#172033">Proxy record</text>
  <rect x="458" y="194" width="226" height="44" rx="12" fill="#F4F8FB"/>
  <text x="480" y="222" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Proxy account exists</text>
  <rect x="458" y="258" width="226" height="44" rx="12" fill="#F4F8FB"/>
  <text x="480" y="286" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Relationship type</text>
  <rect x="458" y="322" width="226" height="44" rx="12" fill="#F4F8FB"/>
  <text x="480" y="350" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Access level</text>
  <rect x="772" y="124" width="302" height="300" rx="18" fill="#E8FBF8" stroke="#04B8AA"/>
  <text x="800" y="162" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#0D8B7E">Decision</text>
  <text x="800" y="204" font-family="Manrope, Arial, sans-serif" font-size="16" fill="#172033">If both records and relationship are valid, restore or route access.</text>
  <text x="800" y="268" font-family="Manrope, Arial, sans-serif" font-size="16" fill="#172033">If age/privacy rules block it, escalate to portal admin.</text>
  <rect x="800" y="340" width="128" height="42" rx="12" fill="url(#brand)"/>
  <text x="840" y="367" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF">Route</text>
  <rect x="944" y="340" width="94" height="42" rx="12" fill="#FFFFFF" stroke="#1357C8"/>
  <text x="971" y="367" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="900" fill="#1357C8">Note</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="194" r="22" fill="#04B8AA"/><text x="110" y="201" fill="#FFFFFF">1</text>
    <circle cx="458" cy="194" r="22" fill="#04B8AA"/><text x="452" y="201" fill="#FFFFFF">2</text>
    <circle cx="458" cy="258" r="22" fill="#1357C8"/><text x="452" y="265" fill="#FFFFFF">3</text>
    <circle cx="800" cy="340" r="22" fill="#1357C8"/><text x="794" y="347" fill="#FFFFFF">4</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Proxy access depends on two records, relationship type, privacy rules, and the access level.</text>
</svg>

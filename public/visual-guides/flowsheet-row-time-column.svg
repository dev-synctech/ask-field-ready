<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: flowsheet row or time column issue</title>
  <desc id="desc">Generic flowsheet mock screen with callouts for group, collapsed row, active time column, and save status.</desc>
  <defs><linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter></defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="56" y="42" width="1088" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Flowsheet</text>
  <rect x="88" y="122" width="236" height="300" rx="18" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="114" y="160" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033">Groups</text>
  <rect x="114" y="188" width="178" height="42" rx="12" fill="url(#brand)"/><text x="136" y="216" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">Mobility</text>
  <rect x="114" y="248" width="178" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/><text x="136" y="276" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Vitals</text>
  <rect x="354" y="122" width="758" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="354" y="122" width="758" height="54" rx="18" fill="#F5F8FB"/>
  <text x="386" y="156" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" fill="#516070">Row</text>
  <text x="648" y="156" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" fill="#516070">08:00</text>
  <text x="810" y="156" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" fill="#1357C8">Now</text>
  <text x="962" y="156" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" fill="#516070">10:00</text>
  <line x1="620" y1="122" x2="620" y2="422" stroke="#E0E7EF"/>
  <line x1="780" y1="122" x2="780" y2="422" stroke="#1357C8" stroke-width="3"/>
  <line x1="936" y1="122" x2="936" y2="422" stroke="#E0E7EF"/>
  <line x1="354" y1="232" x2="1112" y2="232" stroke="#E0E7EF"/>
  <line x1="354" y1="288" x2="1112" y2="288" stroke="#E0E7EF"/>
  <line x1="354" y1="344" x2="1112" y2="344" stroke="#E0E7EF"/>
  <text x="386" y="214" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">Ambulation</text>
  <text x="386" y="270" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#516070">Wheelchair/device</text>
  <text x="386" y="326" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#516070">Assist level</text>
  <text x="812" y="214" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#172033">Select</text>
  <rect x="792" y="304" width="116" height="32" rx="10" fill="#E8FBF8" stroke="#04B8AA"/><text x="818" y="326" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#0D8B7E">File</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="114" cy="188" r="22" fill="#04B8AA"/><text x="108" y="195" fill="#FFFFFF">1</text>
    <circle cx="386" cy="214" r="22" fill="#04B8AA"/><text x="380" y="221" fill="#FFFFFF">2</text>
    <circle cx="810" cy="128" r="22" fill="#1357C8"/><text x="804" y="135" fill="#FFFFFF">3</text>
    <circle cx="792" cy="304" r="22" fill="#1357C8"/><text x="786" y="311" fill="#FFFFFF">4</text>
  </g>
  <text x="88" y="460" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Pick the right group, expand/search the row, confirm the active time column, then verify it filed.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: clean escalation packet</title>
  <desc id="desc">Generic escalation packet mock card with callouts for scope, impact, blocker, owner, and callback.</desc>
  <defs><linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter></defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="180" y="42" width="840" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <rect x="180" y="42" width="840" height="74" rx="28" fill="#F1F6FA"/>
  <text x="224" y="88" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="900" fill="#172033">Command Center Escalation Packet</text>
  <rect x="224" y="146" width="326" height="62" rx="16" fill="#EAF3FF"/><text x="254" y="184" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033">Scope</text>
  <rect x="590" y="146" width="326" height="62" rx="16" fill="#E8FBF8"/><text x="620" y="184" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033">Impact</text>
  <rect x="224" y="238" width="692" height="62" rx="16" fill="#FFF7E8" stroke="#F0C36A"/><text x="254" y="276" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033">Exact blocker / visible status</text>
  <rect x="224" y="330" width="326" height="62" rx="16" fill="#F4F8FB"/><text x="254" y="368" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033">Tried safely</text>
  <rect x="590" y="330" width="326" height="62" rx="16" fill="url(#brand)"/><text x="620" y="368" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="900" fill="#FFFFFF">Owner + callback</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="224" cy="146" r="22" fill="#04B8AA"/><text x="218" y="153" fill="#FFFFFF">1</text>
    <circle cx="590" cy="146" r="22" fill="#04B8AA"/><text x="584" y="153" fill="#FFFFFF">2</text>
    <circle cx="224" cy="238" r="22" fill="#1357C8"/><text x="218" y="245" fill="#FFFFFF">3</text>
    <circle cx="590" cy="330" r="22" fill="#1357C8"/><text x="584" y="337" fill="#FFFFFF">4</text>
  </g>
  <text x="224" y="438" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Send scope, impact, exact blocker, checks tried, owner needed, and callback. No PHI, passwords, or private links.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: scanned document attached to wrong encounter</title>
  <desc id="desc">Generic document details mock screen with callouts for document type, encounter, duplicate risk, and escalation owner.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="58" y="40" width="1084" height="440" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <rect x="88" y="78" width="314" height="364" rx="22" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="116" y="118" font-family="Manrope, Arial, sans-serif" font-size="23" font-weight="800" fill="#172033">Document Preview</text>
  <rect x="124" y="148" width="242" height="264" rx="14" fill="#FFFFFF" stroke="#D7E0EA"/>
  <line x1="150" y1="198" x2="336" y2="198" stroke="#D8E2EC" stroke-width="8" stroke-linecap="round"/>
  <line x1="150" y1="238" x2="336" y2="238" stroke="#D8E2EC" stroke-width="8" stroke-linecap="round"/>
  <line x1="150" y1="278" x2="300" y2="278" stroke="#D8E2EC" stroke-width="8" stroke-linecap="round"/>
  <rect x="452" y="78" width="660" height="364" rx="22" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="486" y="118" font-family="Manrope, Arial, sans-serif" font-size="23" font-weight="800" fill="#172033">Document Details</text>
  <rect x="486" y="150" width="270" height="54" rx="12" fill="#EAF3FF"/><text x="508" y="184" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">Type: Consent form</text>
  <rect x="786" y="150" width="282" height="54" rx="12" fill="#FFF7E8" stroke="#F0C36A"/><text x="808" y="184" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">Encounter: Verify</text>
  <rect x="486" y="232" width="582" height="58" rx="12" fill="#F4F8FB"/><text x="508" y="268" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="700" fill="#516070">Uploaded: Today / Pages: 3 / Quality: Review</text>
  <rect x="486" y="318" width="282" height="52" rx="12" fill="url(#brand)"/><text x="516" y="351" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#FFFFFF">Verify before save</text>
  <rect x="792" y="318" width="276" height="52" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/><text x="824" y="351" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033">Route owner</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="486" cy="150" r="22" fill="#04B8AA"/><text x="480" y="157" fill="#FFFFFF">1</text>
    <circle cx="786" cy="150" r="22" fill="#04B8AA"/><text x="780" y="157" fill="#FFFFFF">2</text>
    <circle cx="486" cy="318" r="22" fill="#1357C8"/><text x="480" y="325" fill="#FFFFFF">3</text>
    <circle cx="792" cy="318" r="22" fill="#1357C8"/><text x="786" y="325" fill="#FFFFFF">4</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Stop before rescanning. Verify document type, encounter/date, duplicate risk, and correction owner.</text>
</svg>

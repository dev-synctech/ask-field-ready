<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: medication scan wrong patient or wrong medication warning</title>
  <desc id="desc">Sanitized mock of a bedside scan showing wrong-patient and wrong-medication warnings with hold-dose and route options.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Bedside scan — safety warning</text>

  <!-- Wristband scan -->
  <rect x="88" y="124" width="302" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="116" y="160" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="900" fill="#172033">Patient scan</text>
  <rect x="116" y="186" width="246" height="46" rx="12" fill="#F4F8FB"/>
  <text x="140" y="215" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#516070">Wristband barcode</text>
  <rect x="116" y="248" width="246" height="74" rx="12" fill="#FDECEC" stroke="#E66767"/>
  <text x="140" y="276" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#8B1F1F">Wrong patient</text>
  <text x="140" y="300" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Wristband does not match chart</text>

  <!-- Med scan -->
  <rect x="410" y="124" width="302" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="438" y="160" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="900" fill="#172033">Medication scan</text>
  <rect x="438" y="186" width="246" height="46" rx="12" fill="#F4F8FB"/>
  <text x="462" y="215" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#516070">Package barcode</text>
  <rect x="438" y="248" width="246" height="74" rx="12" fill="#FDECEC" stroke="#E66767"/>
  <text x="462" y="276" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="900" fill="#8B1F1F">Wrong medication</text>
  <text x="462" y="300" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">Med does not match active order</text>

  <!-- Decision -->
  <rect x="732" y="124" width="342" height="300" rx="18" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="760" y="160" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#172033">Stop and route</text>
  <rect x="760" y="186" width="286" height="40" rx="11" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="780" y="212" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#516070">Wrong patient → re-verify identity</text>
  <rect x="760" y="234" width="286" height="40" rx="11" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="780" y="260" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#516070">Wrong medication → pharmacy owner</text>
  <rect x="760" y="282" width="286" height="40" rx="11" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="780" y="308" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#516070">Device issue → device support</text>
  <rect x="760" y="346" width="150" height="42" rx="12" fill="url(#brand)"/>
  <text x="800" y="373" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#FFFFFF">Hold dose</text>
  <rect x="922" y="346" width="124" height="42" rx="12" fill="#FFFFFF" stroke="#1357C8"/>
  <text x="952" y="373" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#1357C8">Route</text>

  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="186" r="22" fill="#04B8AA"/><text x="110" y="193" fill="#FFFFFF">1</text>
    <circle cx="116" cy="248" r="22" fill="#E66767"/><text x="110" y="255" fill="#FFFFFF">2</text>
    <circle cx="438" cy="248" r="22" fill="#E66767"/><text x="432" y="255" fill="#FFFFFF">3</text>
    <circle cx="760" cy="234" r="22" fill="#1357C8"/><text x="754" y="241" fill="#FFFFFF">4</text>
    <circle cx="800" cy="368" r="22" fill="#1357C8"/><text x="794" y="375" fill="#FFFFFF">5</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">Never override a wrong-patient or wrong-med warning — hold the dose and route the correct owner.</text>
</svg>

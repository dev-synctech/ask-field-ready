<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Consent before procedure mock screen</title>
  <desc id="desc">Generic Mizly mock screen showing procedure context, signed status, scan/link status, and owner escalation.</desc>
  <defs><style>.bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8e0eb;stroke-width:2}.nav{fill:#172033}.card{fill:#fff;stroke:#d8e0eb;stroke-width:2}.warn{fill:#fff7ed;stroke:#f59e0b;stroke-width:2}.ok{fill:#ecfdf5;stroke:#14b8a6;stroke-width:2}.danger{fill:#fff1f2;stroke:#e11d48;stroke-width:2}.text{font-family:Arial,sans-serif;fill:#172033}.muted{fill:#637083}.head{font-size:24px;font-weight:700}.small{font-size:16px}.tiny{font-size:13px}.line{stroke:#d8e0eb;stroke-width:2}.num{fill:#1554c7}.numtext{fill:#fff;font-size:18px;font-weight:700}</style></defs>
  <rect width="960" height="560" rx="28" class="bg"/>
  <rect x="36" y="36" width="888" height="488" rx="24" class="panel"/>
  <rect x="36" y="36" width="888" height="58" rx="24" class="nav"/>
  <text x="62" y="130" class="text head">Procedure Consent Status</text>
  <text x="62" y="156" class="text small muted">Separate signed consent from scan/link status before the case proceeds.</text>
  <rect x="62" y="190" width="236" height="216" rx="16" class="card"/>
  <text x="86" y="224" class="text small" font-weight="700">Procedure context</text>
  <path d="M86 260h150M86 292h180M86 324h126" class="line"/>
  <rect x="330" y="190" width="236" height="216" rx="16" class="danger"/>
  <text x="354" y="224" class="text small" font-weight="700">Signed status</text>
  <path d="M354 260h152M354 292h168M354 324h138" class="line"/>
  <rect x="598" y="190" width="260" height="216" rx="16" class="warn"/>
  <text x="622" y="224" class="text small" font-weight="700">Scan / link status</text>
  <path d="M622 260h178M622 292h142M622 324h192" class="line"/>
  <rect x="62" y="436" width="796" height="44" rx="16" class="ok"/>
  <text x="88" y="464" class="text tiny">Mizly visual guide: missing signed consent, wrong encounter, or active case timing = immediate owner escalation.</text>
  <g><circle cx="62" cy="190" r="18" class="num"/><text x="56" y="197" class="numtext">1</text></g>
  <g><circle cx="330" cy="190" r="18" class="num"/><text x="324" y="197" class="numtext">2</text></g>
  <g><circle cx="598" cy="190" r="18" class="num"/><text x="592" y="197" class="numtext">3</text></g>
  <g><circle cx="858" cy="436" r="18" class="num"/><text x="852" y="443" class="numtext">4</text></g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mizly visual guide: blank or wrong smart link</title>
  <desc id="desc">Sanitized mock note editor showing note context, unresolved smart text, chart data source, and refresh or owner route.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#04B8AA"/><stop offset="1" stop-color="#1357C8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102033" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#F7FAFC"/>
  <rect x="54" y="42" width="1092" height="436" rx="28" fill="#FFFFFF" stroke="#D7E0EA" filter="url(#shadow)"/>
  <text x="88" y="92" font-family="Manrope, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Note editor</text>
  <rect x="88" y="124" width="590" height="300" rx="18" fill="#FFFFFF" stroke="#D8E2EC"/>
  <rect x="116" y="156" width="514" height="46" rx="12" fill="#F4F8FB"/>
  <text x="140" y="185" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="800" fill="#516070">Note type and encounter context</text>
  <rect x="116" y="228" width="514" height="126" rx="14" fill="#F8FBFD" stroke="#D8E2EC"/>
  <text x="142" y="266" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="900" fill="#172033">Text area</text>
  <rect x="142" y="286" width="286" height="34" rx="9" fill="#FFF7E6" stroke="#F1C46C"/>
  <text x="158" y="309" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="800" fill="#9A6500">Unresolved / blank link</text>
  <rect x="720" y="124" width="382" height="300" rx="18" fill="#F4F8FB" stroke="#D8E2EC"/>
  <text x="748" y="162" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="900" fill="#172033">What to verify</text>
  <rect x="748" y="190" width="292" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="770" y="218" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Chart data exists</text>
  <rect x="748" y="250" width="292" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="770" y="278" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Right encounter/date</text>
  <rect x="748" y="310" width="292" height="42" rx="12" fill="#FFFFFF" stroke="#D8E2EC"/>
  <text x="770" y="338" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" fill="#516070">Personal vs shared tool</text>
  <rect x="748" y="370" width="126" height="38" rx="11" fill="url(#brand)"/>
  <text x="783" y="395" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#FFFFFF">Refresh</text>
  <rect x="890" y="370" width="150" height="38" rx="11" fill="#FFFFFF" stroke="#1357C8"/>
  <text x="924" y="395" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#1357C8">Route owner</text>
  <g font-family="Manrope, Arial, sans-serif" font-weight="900" font-size="20">
    <circle cx="116" cy="156" r="22" fill="#04B8AA"/><text x="110" y="163" fill="#FFFFFF">1</text>
    <circle cx="142" cy="286" r="22" fill="#04B8AA"/><text x="136" y="293" fill="#FFFFFF">2</text>
    <circle cx="748" cy="190" r="22" fill="#1357C8"/><text x="742" y="197" fill="#FFFFFF">3</text>
    <circle cx="748" cy="370" r="22" fill="#1357C8"/><text x="742" y="377" fill="#FFFFFF">4</text>
  </g>
  <text x="88" y="466" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#516070">First check context and source data. If shared content is broken, route the content/build owner.</text>
</svg>

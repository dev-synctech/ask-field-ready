<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Attestation or cosign routing mock screen</title>
  <desc id="desc">Generic Mizly mock screen showing source action, owner role, routing status, and escalation.</desc>
  <defs>
    <style>.bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8e0eb;stroke-width:2}.dark{fill:#172033}.soft{fill:#eef5ff}.teal{fill:#ecfdf5;stroke:#14b8a6;stroke-width:2}.line{stroke:#d8e0eb;stroke-width:2}.text{font-family:Arial,sans-serif;fill:#172033}.muted{fill:#637083}.head{font-size:24px;font-weight:700}.small{font-size:16px}.tiny{font-size:13px}.num{fill:#1554c7}.numtext{fill:#fff;font-size:18px;font-weight:700}</style>
  </defs>
  <rect width="960" height="560" rx="28" class="bg"/>
  <rect x="36" y="36" width="888" height="488" rx="24" class="panel"/>
  <rect x="36" y="36" width="888" height="58" rx="24" class="dark"/>
  <text x="56" y="130" class="text head">Signature Task Routing</text>
  <text x="56" y="156" class="text small muted">Do not chase screens until owner and source action are clear.</text>
  <rect x="58" y="190" width="190" height="206" rx="16" class="soft"/>
  <text x="82" y="222" class="text small" font-weight="700">Source action</text>
  <path d="M82 252h130M82 280h104M82 308h142" class="line"/>
  <rect x="286" y="190" width="190" height="206" rx="16" class="soft"/>
  <text x="310" y="222" class="text small" font-weight="700">Owner role</text>
  <path d="M310 252h126M310 280h116M310 308h136" class="line"/>
  <rect x="514" y="190" width="190" height="206" rx="16" class="soft"/>
  <text x="538" y="222" class="text small" font-weight="700">Task status</text>
  <path d="M538 252h128M538 280h114M538 308h138" class="line"/>
  <rect x="742" y="190" width="136" height="206" rx="16" class="teal"/>
  <text x="766" y="222" class="text small" font-weight="700">Route</text>
  <path d="M766 252h76M766 280h68M766 308h82" class="line"/>
  <path d="M248 292h38M476 292h38M704 292h38" stroke="#1554c7" stroke-width="3" stroke-linecap="round"/>
  <g><circle cx="58" cy="190" r="18" class="num"/><text x="52" y="197" class="numtext">1</text></g>
  <g><circle cx="286" cy="190" r="18" class="num"/><text x="280" y="197" class="numtext">2</text></g>
  <g><circle cx="514" cy="190" r="18" class="num"/><text x="508" y="197" class="numtext">3</text></g>
  <g><circle cx="742" cy="190" r="18" class="num"/><text x="736" y="197" class="numtext">4</text></g>
  <rect x="58" y="432" width="820" height="48" rx="16" fill="#f8fafc" stroke="#d8e0eb"/>
  <text x="84" y="462" class="text tiny">Mizly visual guide: identify source action, owner role, routing visibility, and callback before escalation.</text>
</svg>
